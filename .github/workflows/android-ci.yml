name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, Test & Build (stagingDebug)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate local.properties (CI dummy values)
        run: |
          cat > local.properties <<'EOF'
          BASE_URL_STAGING=http://10.0.2.2:8000
          BASE_URL_PRODUCTION=http://10.0.2.2:8000
          EOF

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Lint
        run: ./gradlew lintStagingDebug --stacktrace

      - name: Unit Tests
        run: ./gradlew testStagingDebugUnitTest --stacktrace

      - name: Build
        run: ./gradlew assembleStagingDebug --stacktrace

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-stagingDebug.html
          if-no-files-found: ignore

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testStagingDebugUnitTest/
          if-no-files-found: ignore
